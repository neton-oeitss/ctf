<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybersecurity Defense CTF</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🛡️ Cybersecurity Defense CTF</h1>
            <p>Pon a prueba tus habilidades en ciberseguridad defensiva</p>
        </div>
    </header>

    <div class="container">
        <div class="controls">
            <input type="text" id="search" placeholder="🔍 Buscar ejercicios...">
            <select id="module-filter">
                <option value="">Todos los módulos</option>
            </select>
            <select id="difficulty-filter">
                <option value="">Todas las dificultades</option>
                <option value="easy">Fácil</option>
                <option value="medium">Media</option>
                <option value="hard">Difícil</option>
            </select>
            <button id="reset-filters">Resetear Filtros</button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <h3>Total Ejercicios</h3>
                <div class="value" id="total-exercises">0</div>
            </div>
            <div class="stat-item">
                <h3>Resueltos</h3>
                <div class="value" id="solved-exercises">0</div>
            </div>
            <div class="stat-item">
                <h3>Puntos Totales</h3>
                <div class="value" id="total-points">0</div>
            </div>
            <div class="stat-item">
                <h3>Progreso</h3>
                <div class="value" id="progress-percent">0%</div>
            </div>
        </div>

        <div class="filter-chips" id="module-chips">
        </div>

        <main id="modules-container">
        </main>

        <footer>
            <p>Cybersecurity Defense CTF - Práctica y mejora tus habilidades de seguridad</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
